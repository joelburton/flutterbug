<!DOCTYPE html>
<!--
  Phase 0 smoke check for the AsyncGlk bundle.
  Open at /static/asyncglk-smoke.html and read the page text + console.
-->
<html>
<head>
<meta charset="utf-8">
<title>AsyncGlk bundle smoke check</title>
<style>
  body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #ddd; }
  .ok { color: #6f6; }
  .bad { color: #f66; }
  pre { background: #2a2a2a; padding: 8px; border-radius: 4px; }
</style>
</head>
<body>
<h1>AsyncGlk bundle smoke check</h1>
<div id="result">Loading bundle...</div>
<pre id="detail"></pre>

<!-- Structural DOM AsyncGlk's WebGlkOte expects to find. Hidden until init. -->
<div id="gameport" style="display:none;">
  <div id="windowport"></div>
  <div id="loadingpane">Loading...</div>
  <div id="errorpane" style="display:none;"><div id="errorcontent"></div></div>
</div>

<script src="/static/jquery-3.7.1.min.js"></script>
<script src="/static/asyncglk.bundle.js"></script>
<script>
(function () {
    const result = document.getElementById('result');
    const detail = document.getElementById('detail');
    const checks = [];

    function check(label, ok, info) {
        checks.push({label, ok, info});
        const cls = ok ? 'ok' : 'bad';
        const sign = ok ? '✓' : '✗';
        result.innerHTML += `<div class="${cls}">${sign} ${label}${info ? ': ' + info : ''}</div>`;
    }

    check('AsyncGlk global exists', typeof AsyncGlk !== 'undefined',
        typeof AsyncGlk);
    if (typeof AsyncGlk !== 'undefined') {
        check('AsyncGlk.WebGlkOte exists', !!AsyncGlk.WebGlkOte, typeof AsyncGlk.WebGlkOte);
        check('AsyncGlk.Blorb exists', !!AsyncGlk.Blorb, typeof AsyncGlk.Blorb);
        check('AsyncGlk.protocol exists', !!AsyncGlk.protocol, typeof AsyncGlk.protocol);
        if (AsyncGlk.WebGlkOte) {
            try {
                const inst = new AsyncGlk.WebGlkOte();
                check('Can instantiate WebGlkOte', true, 'classname=' + inst.classname);
                detail.textContent = 'WebGlkOte instance properties:\n' +
                    Object.keys(inst).map(k => '  ' + k).join('\n');
            } catch (e) {
                check('Can instantiate WebGlkOte', false, e.message);
            }
        }
    }
})();
</script>
</body>
</html>
