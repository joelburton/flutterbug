<!DOCTYPE HTML>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flutterbug · /play2 (AsyncGlk PoC)</title>
<link rel="icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<link rel="stylesheet" href="/static/fonts.css?v={{ asset_version }}" type="text/css">
<!-- AsyncGlk's web GlkOte CSS in place of Plotkin's glkote.css. AsyncGlk's
     own light.css/dark.css aren't included: every var they set is already
     supplied by the flutterbug theme cascade below, so they'd be dead weight. -->
<link rel="stylesheet" href="/static/asyncglk-css/glkote.css?v={{ asset_version }}" type="text/css">
<link rel="stylesheet" href="/static/dialog.css?v={{ asset_version }}" type="text/css">
<!-- Selected theme CSS. Pulls in theme-base-{light,dark}.css and
     theme-base.css transitively via @import -- one link, full cascade. -->
<link rel="stylesheet" href="/static/{{ theme_css }}?v={{ asset_version }}" type="text/css">

<script type="text/javascript">
var multiplayer_playername = {{ playername | tojson }};
</script>

<script src="/static/jquery-3.7.1.min.js?v={{ asset_version }}" type="text/javascript"></script>
<!-- Plotkin's simplified file-pick dialog (vendored); play2.bundle.js wraps
     it in an async adapter so AsyncGlk's Dialog.prompt() flows through the
     same flutterbug-styled modal we use for save/restore/transcript. -->
<script src="/static/namedialog.js?v={{ asset_version }}" type="text/javascript"></script>
<script src="/static/play2.bundle.js?v={{ asset_version }}" type="text/javascript"></script>

</head>
<body class="theme-{{ themename }} mode-{{ mode }}">
<div id="gameport">
<div id="windowport">
<noscript><hr>
<p>You'll need to turn on Javascript in your web browser to play this game.</p>
<hr></noscript>
</div>
<div id="loadingpane">
<img src="/static/waiting.gif" alt="LOADING"><br>
<em>&nbsp;&nbsp;&nbsp;Loading...</em>
</div>
<div id="errorpane" style="display:none;"><div id="errorcontent">...</div></div>
</div>

<div id="sidebar">
<div id="brand">
  <img src="/static/butterfly.jpg" alt="Flutterbug butterfly">
  <div id="brand-name">Flutterbug
    <span style="font-size: 9px; color: #4a4; margin-left: 4px;">AsyncGlk</span>
  </div>
</div>
<div id="shared-status"></div>
<div id="players-list"></div>
<h3>Recent Commands
  <button id="download-commands" class="feed-download" type="button"
          title="Download commands as a text file"
          aria-label="Download commands">⤓</button>
</h3>
<div id="command-feed"></div>
<h3>Chat
  <button id="download-chat" class="feed-download" type="button"
          title="Download chat as a text file"
          aria-label="Download chat">⤓</button>
</h3>
<div id="chat-messages"></div>
<div id="chat-input-row">
  <input id="chat-input" type="text" placeholder="Say something..." autocomplete="off">
  <button id="chat-send">Send</button>
</div>
<label id="slash-chat-option">
  <input id="slash-chat-toggle" type="checkbox" checked>
  Use <kbd>/</kbd> to jump to chat
</label>
<div id="font-size-controls">
  <span class="font-size-label">Game text size</span>
  <div class="font-size-buttons">
    <button id="font-size-down" type="button" aria-label="Smaller game text">A−</button>
    <button id="font-size-reset" type="button" aria-label="Reset game text size">100%</button>
    <button id="font-size-up" type="button" aria-label="Larger game text">A+</button>
  </div>
</div>
</div>

</body>
</html>
